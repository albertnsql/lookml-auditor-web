[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short summary for failures/errors
addopts = -v --tb=short -ra

# Treat warnings as errors for our own code only
filterwarnings =
    error::DeprecationWarning:lookml_parser
    error::DeprecationWarning:validators
    ignore::DeprecationWarning:pydantic
    ignore::DeprecationWarning:httpx
    ignore::DeprecationWarning:starlette
